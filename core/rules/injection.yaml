injection_rules:
  - name: instruction_override
    patterns:
      - "ignore previous instructions"
      - "ignore all previous"
      - "disregard your instructions"
      - "forget your instructions"
      - "override your instructions"
      - "忽略之前的所有指令"
      - "忽略之前的指令"
      - "无视之前的指令"
      - "忘记你的指令"
    severity: critical
    description: "覆盖系统指令的注入尝试"

  - name: role_hijack
    patterns:
      - "you are now"
      - "from now on you are"
      - "pretend you are"
      - "act as if you are"
      - "imagine you are"
      - "从现在起你是"
      - "从现在开始你是"
      - "假装你是"
      - "假设你是"
    severity: critical
    description: "角色劫持攻击"

  - name: delimiter_attack
    patterns:
      - "### SYSTEM:"
      - "### ASSISTANT:"
      - "### USER:"
      - "<\\|im_start\\|>"
      - "<\\|im_end\\|>"
      - "\\[INST\\]"
      - "\\[/INST\\]"
      - "<\\|system\\|>"
      - "<\\|user\\|>"
      - "<\\|assistant\\|>"
    severity: high
    description: "分隔符注入攻击"

  - name: info_extraction
    patterns:
      - "print your system prompt"
      - "output your instructions"
      - "show me your prompt"
      - "reveal your system prompt"
      - "what is your system prompt"
      - "输出你的系统提示词"
      - "打印你的系统提示"
      - "告诉我你的指令"
      - "显示你的系统提示"
    severity: high
    description: "信息提取攻击"

  - name: encoding_bypass
    patterns:
      - "base64:"
      - "rot13:"
      - "decode this"
      - "encode this"
      - "hex string"
      - "解码以下内容"
      - "编码以下内容"
    severity: medium
    description: "编码绕过检测"
