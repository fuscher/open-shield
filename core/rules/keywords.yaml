keyword_rules:
  - category: database_dangerous
    keywords:
      - "drop table"
      - "drop database"
      - "drop index"
      - "truncate table"
      - "delete from"
      - "删除表"
      - "清空表"
      - "删除数据库"
    severity: high
    description: "数据库危险操作"

  - category: financial
    keywords: ["转账", "汇款", "payment", "transfer"]
    severity: critical
    description: "财务操作"

  - category: system
    keywords: ["rm -rf", "format", "reboot", "shutdown", "重启", "关机"]
    severity: critical
    description: "系统危险操作"

  - category: system_command
    keywords: ["rm ", "rmdir", "del ", "Remove-Item"]
    severity: high
    description: "删除命令"

  - category: network
    keywords: ["curl", "wget"]
    severity: low
    description: "网络请求"
